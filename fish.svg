<svg xmlns="http://www.w3.org/2000/svg" width="620" height="120" viewBox="0 0 620 120" font-family="'JetBrains Mono','DejaVu Sans Mono','Courier New',monospace">
  <!-- dashed waterline -->
  <line x1="20" y1="92" x2="600" y2="92" stroke="#5c6785" stroke-width="1.5" stroke-dasharray="6 7" opacity="0.55">
    <animate attributeName="stroke-dashoffset" from="0" to="-26" dur="1.8s" repeatCount="indefinite"/>
  </line>

  <!-- rising bubbles -->
  <g fill="#7aa2f7">
    <circle cx="140" cy="86" r="2.4" opacity="0">
      <animate attributeName="cy" values="86;40" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="88" r="1.8" opacity="0">
      <animate attributeName="cy" values="88;46" dur="4s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="4s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="85" r="2.1" opacity="0">
      <animate attributeName="cy" values="85;44" dur="3.6s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.75;0" dur="3.6s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- fish facing RIGHT: visible + moving left->right in first half -->
  <text y="72" font-size="30" font-weight="600" fill="#5aa0e6" xml:space="preserve">&gt;&lt;(((&#176;&gt;<animate attributeName="opacity" values="1;0" keyTimes="0;0.5" calcMode="discrete" dur="10s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="30,0; 470,0; 470,0" keyTimes="0;0.5;1" dur="10s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" additive="sum" values="0,0; 0,-7; 0,0; 0,7; 0,0" dur="2.6s" repeatCount="indefinite"/></text>

  <!-- fish facing LEFT: visible + moving right->left in second half -->
  <text y="72" font-size="30" font-weight="600" fill="#5aa0e6" xml:space="preserve">&lt;&#176;)))&gt;&lt;<animate attributeName="opacity" values="0;1" keyTimes="0;0.5" calcMode="discrete" dur="10s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="470,0; 470,0; 30,0" keyTimes="0;0.5;1" dur="10s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" additive="sum" values="0,0; 0,7; 0,0; 0,-7; 0,0" dur="2.6s" repeatCount="indefinite"/></text>
</svg>
